<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DAM Introspect</title>
</head>
<body>
<pre id="out">fetching...</pre>
<script>

const EP = 'http://digital-asset-manager-desired-service.crmmktg-branding-digitalassetmanager-prd.svc.cluster.local:8090/graphql';

const INTROSPECTION_QUERY = `
query {
  getAllBrandProfiles {
    accountId
    brandProfileId
    attributes { attributeName attributeValue }
    createdAt
    updatedAt
  }
}
`;

const out = document.getElementById('out');

fetch(EP, {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  },
  body: JSON.stringify({ query: INTROSPECTION_QUERY })
})
.then(r => {
  out.textContent = 'HTTP ' + r.status + ' ' + r.statusText + '\n';
  return r.text();
})
.then(body => {
  out.textContent += body;
})
.catch(err => {
  // Mixed-content block or network error — try HTTPS fallback on port 443
  out.textContent = 'PRIMARY_FAIL: ' + err.toString() + '\nTrying HTTPS fallback...\n';
  const FALLBACK = 'https://digital-asset-manager-desired-service.crmmktg-branding-digitalassetmanager-prd.svc.cluster.local/graphql';
  return fetch(FALLBACK, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    },
    body: JSON.stringify({ query: INTROSPECTION_QUERY })
  })
  .then(r => {
    out.textContent += 'FALLBACK HTTP ' + r.status + ' ' + r.statusText + '\n';
    return r.text();
  })
  .then(body => {
    out.textContent += body;
  })
  .catch(err2 => {
    out.textContent += 'FALLBACK_FAIL: ' + err2.toString();
  });
});
</script>
</body>
</html>
