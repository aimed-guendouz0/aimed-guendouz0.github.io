<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DAM Introspect</title>
</head>
<body>
<pre id="out">fetching...</pre>
<script>
// Target: DAM internal GraphQL endpoint (port 8090, bypasses Istio sidecar auth proxy)
// If this page is served over HTTPS (GitHub Pages), change to HTTPS endpoint on port 443
// to avoid mixed-content blocking:
//   const EP = 'https://digital-asset-manager-desired-service.crmmktg-branding-digitalassetmanager-prd.svc.cluster.local/graphql';
// If served over HTTP (python3 -m http.server + ngrok http), use:
const EP = 'http://digital-asset-manager-desired-service.crmmktg-branding-digitalassetmanager-prd.svc.cluster.local:8090/graphql';

const INTROSPECTION_QUERY = `
query IntrospectionQuery {
  __schema {
    queryType { name }
    mutationType { name }
    subscriptionType { name }
    types {
      ...FullType
    }
    directives {
      name
      description
      locations
      args { ...InputValue }
    }
  }
}
fragment FullType on __Type {
  kind name description
  fields(includeDeprecated: true) {
    name description isDeprecated deprecationReason
    args { ...InputValue }
    type { ...TypeRef }
  }
  inputFields { ...InputValue }
  interfaces { ...TypeRef }
  enumValues(includeDeprecated: true) {
    name description isDeprecated deprecationReason
  }
  possibleTypes { ...TypeRef }
}
fragment InputValue on __InputValue {
  name description defaultValue
  type { ...TypeRef }
}
fragment TypeRef on __Type {
  kind name
  ofType {
    kind name
    ofType {
      kind name
      ofType {
        kind name
        ofType {
          kind name
          ofType {
            kind name
            ofType { kind name ofType { kind name } }
          }
        }
      }
    }
  }
}
`;

const out = document.getElementById('out');

fetch(EP, {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  },
  body: JSON.stringify({ query: INTROSPECTION_QUERY })
})
.then(r => {
  out.textContent = 'HTTP ' + r.status + ' ' + r.statusText + '\n';
  return r.text();
})
.then(body => {
  out.textContent += body;
})
.catch(err => {
  // Mixed-content block or network error — try HTTPS fallback on port 443
  out.textContent = 'PRIMARY_FAIL: ' + err.toString() + '\nTrying HTTPS fallback...\n';
  const FALLBACK = 'https://digital-asset-manager-desired-service.crmmktg-branding-digitalassetmanager-prd.svc.cluster.local/graphql';
  return fetch(FALLBACK, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    },
    body: JSON.stringify({ query: INTROSPECTION_QUERY })
  })
  .then(r => {
    out.textContent += 'FALLBACK HTTP ' + r.status + ' ' + r.statusText + '\n';
    return r.text();
  })
  .then(body => {
    out.textContent += body;
  })
  .catch(err2 => {
    out.textContent += 'FALLBACK_FAIL: ' + err2.toString();
  });
});
</script>
</body>
</html>
